# Ribbon order for the Render panel. pyRevit reads the order from this metadata
# file (the older `_layout` text file is deprecated and ignored). `---` is a
# visible separator that groups buttons without hiding them; `>>>` would push the
# rest into a slide-out drawer.
layout:
  - LoadModel          # extract the active view -> its own cache slot (the slow, explicit step)
  - OpenModel          # open a loaded view in interactive Blender
  - RenderLoadedModel  # headless render a loaded view as-is
  - Views              # the loaded-views list: open / render / reload / remove, with staleness
  - "---"
  - Mode               # render mode (16 looks)
  - Quality            # effort preset (engine + samples + denoise)
  - Resolution         # output size
  - Engine             # Cycles / EEVEE toggle
  - "---"
  - OpenRenders        # open the output folder
  - Settings           # configure everything
  - About              # project info + GitHub + portfolio links
